function data(n){let w=weeks[n-1];if(!state[n])state[n]={done:false,refs:w.refs.map(x=>({text:x.text,url:x.url,done:false,fav:false,favWhy:'',favChrist:'',favImpression:''})),learned:'',attribute:'',scripture:'',impressions:''};if(w.refs.some(r=>r.text)&&(!state[n].refs||state[n].refs.length!==w.refs.length||state[n].refs.some((r,i)=>r.text!==w.refs[i].text||r.url!==w.refs[i].url))){let old=state[n].refs||[];state[n].refs=w.refs.map((x,i)=>({text:x.text,url:x.url,done:old[i]?.done||false,fav:old[i]?.fav||false,favWhy:old[i]?.favWhy||'',favChrist:old[i]?.favChrist||'',favImpression:old[i]?.favImpression||''}))}return state[n]}
function save(){localStorage.setItem('tgStudyState',JSON.stringify(state));localStorage.setItem('tgStudyCurrent',current);renderList();stats()}
function hideAllViews(){document.getElementById('list').classList.remove('on');document.getElementById('detail').classList.remove('on');document.getElementById('favoritesJournal').classList.remove('on')}
function showList(){hideAllViews();document.getElementById('list').classList.add('on');scrollTo(0,0)}
function openWeek(n){current=n;renderDetail();hideAllViews();document.getElementById('detail').classList.add('on');save();scrollTo(0,0)}
function renderList(){let el=document.getElementById('weeks');el.innerHTML='';weeks.forEach(w=>{let d=data(w.week),c=d.refs.filter(r=>r.done).length,f=d.refs.filter(r=>r.fav).length,b=document.createElement('button');b.className='week '+(w.week===current?'activeWeek':'');b.innerHTML=`<b>Week ${w.week}</b><span>${w.topic}</span><br><span>${c}/${d.refs.length} refs • ⭐ ${f}</span>`;b.onclick=()=>openWeek(w.week);el.appendChild(b)})}
function renderDetail(){let w=weeks[current-1],d=data(current),c=document.getElementById('content');c.innerHTML=`<div class="top"><button onclick="showList()">← Weeks</button><div class="spacer"></div><label style="margin:0;font-weight:500"><input id="done" type="checkbox" ${d.done?'checked':''}> Complete</label></div><h2>Week ${w.week}</h2><h3>Jesus Christ, ${w.topic}</h3><label>Scripture References Studied</label><div class="muted">Tap a blue reference to open the passage. On iPhone, long-press and choose “Open in Library” if it opens in Safari first.</div><div class="refs" id="refs"></div><label>What Did I Learn About Jesus Christ This Week?</label><textarea id="learned">${esc(d.learned)}</textarea><label>Attribute of Christ I Discovered</label><textarea id="attribute" style="min-height:80px">${esc(d.attribute)}</textarea><label>Scripture That Impacted Me Most</label><textarea id="scripture" style="min-height:80px">${esc(d.scripture)}</textarea><label>Impressions / Revelations</label><textarea id="impressions" style="min-height:260px">${esc(d.impressions)}</textarea><br><button class="primary" onclick="save();alert('Saved')">Save Week</button><button onclick="printWeek(false)">Print Completed Page</button><button onclick="printWeek(true)">Print Blank Page</button>`;let refs=document.getElementById('refs');d.refs.forEach((r,i)=>{let div=document.createElement('div');div.className='ref';div.innerHTML=`<span>${i+1}.</span><input type="checkbox" ${r.done?'checked':''}><button class="starBtn ${r.fav?'fav':''}" title="Favorite scripture">★</button><a href="${attr(r.url||'#')}" target="_blank">${esc(r.text||'Reference')}</a>`;div.querySelector('input').onchange=e=>{r.done=e.target.checked;save()};div.querySelector('.starBtn').onclick=e=>{r.fav=!r.fav;e.currentTarget.classList.toggle('fav',r.fav);save()};refs.appendChild(div)});document.getElementById('done').onchange=e=>{d.done=e.target.checked;save()};['learned','attribute','scripture','impressions'].forEach(id=>docume function printWeek(blank){let w=weeks[current-1],d=data(current);let refs=d.refs.map((r,i)=>`<div>${i+1}. ${blank?'____________________________':(r.done?'☑':'☐')+' '+(r.fav?'★ ':'')+esc(r.text)}</div>`).join('');let line='<div class="line"></div>';let p=window.open('','_blank');p.document.write(`<html><head><title>Week ${w.week}</title><style>body{font-family:Georgia,serif;margin:36px;color:#222}h1{font-size:24px;margin-bottom:0}h2{font-size:18px;margin-top:6px;border-bottom:1px solid #999;padding-bottom:8px}.refs{columns:2;column-gap:28px;font-size:12px;line-height:1.45}.section{margin-top:18px}.label{font-weight:bold;margin-bottom:8px}.line{border-bottom:1px solid #555;height:20px}.answer{white-space:pre-wrap;line-height:1.45;border-top:1px solid #ccc;padding-top:6px}@media print{button{display:none}}</style></head><body><button onclick="window.print()">Print / Save PDF</button><h1>Week ${w.week}</h1><h2>Jesus Christ, ${esc(w.topic)}</h2><div class="section"><div class="label">Scripture References Studied</div><div class="refs">${refs}</div></div><div class="section"><div class="label">What Did I Learn About Jesus Christ This Week?</div>${blank?line.repeat(6):'<div class="answer">'+esc(d.learned||'')+'</div>'}</div><div class="section"><div class="label">Attribute of Christ I Discovered</div>${blank?line.repeat(2):'<div class="answer">'+esc(d.attribute||'')+'</div>'}</div><div class="section"><div class="label">Scripture That Impacted Me Most</div>${blank?line.repeat(2):'<div class="answer">'+esc(d.scripture||'')+'</div>'}</div><div class="section"><div class="label">Impressions / Revelations</div>${blank?line.repeat(14):'<div class="answer">'+esc(d.impressions||'')+'</div>'}</div></body></html>`);p.document.close()}
function favoriteItems(){let out=[];weeks.forEach(w=>{let d=data(w.week);d.refs.forEach((r,i)=>{if(r.fav)out.push({week:w.week,topic:w.topic,index:i,ref:r})})});return out}
function showFavoritesJournal(){hideAllViews();renderFavoritesJournal();document.getElementById('favoritesJournal').classList.add('on');scrollTo(0,0)}
function renderFavoritesJournal(){let list=document.getElementById('favoritesJournalList'),items=favoriteItems();if(!items.length){list.innerHTML='<p class="muted">No favorite scriptures yet. Open a week and tap the star beside a scripture.</p>';return}let out='';items.forEach(x=>{out+=`<div class="favCard"><b>Week ${x.week}: ${esc(x.topic)}</b><br><a target="_blank" href="${attr(x.ref.url||'#')}">★ ${esc(x.ref.text)}</a><label>Why did this scripture stand out?</label><textarea data-week="${x.week}" data-index="${x.index}" data-field="favWhy">${esc(x.ref.favWhy||'')}</textarea><label>What does it teach me about Jesus Christ?</label><textarea data-week="${x.week}" data-index="${x.index}" data-field="favChrist">${esc(x.ref.favChrist||'')}</textarea><label>Personal impression / action</label><textarea data-week="${x.week}" data-index="${x.index}" data-field="favImpression">${esc(x.ref.favImpression||'')}</textarea></div>`});list.innerHTML=out;list.querySelectorAll('textarea').forEach(t=>{t.oninput=e=>{let w=Number(e.target.dataset.week),i=Number(e.target.dataset.index),field=e.target.dataset.field;data(w).refs[i][field]=e.target.value;save()}})}
function printFavoritesJournal(){let items=favoriteItems();let rows=items.length?items.map((x,i)=>`<div class="fav"><h3>${i+1}. Week ${x.week} — ${esc(x.topic)}</h3><p><b>Scripture:</b> ${esc(x.ref.text)}</p><p><b>Why it stood out:</b><br>${esc(x.ref.favWhy||'')}</p><p><b>What it teaches me about Jesus Christ:</b><br>${esc(x.ref.favChrist||'')}</p><p><b>Personal impression / action:</b><br>${esc(x.ref.favImpression||'')}</p></div>`).join(''):'<p>No favorite scriptures yet.</p>';let p=window.open('','_blank');p.document.write(`<html><head><title>Favorite Scripture Journal</title><style>body{font-family:Georgia,serif;margin:36px;color:#222}h1{font-size:24px}.fav{border-bottom:1px solid #aaa;padding:12px 0}p{white-space:pre-wrap;line-height:1.4}@media print{button{display:none}}</style></head><body><button onclick="window.print()">Print / Save PDF</button><h1>Favorite Scripture Journal</h1>${rows}</body></html>`);p.document.close()}
function stats(){let dw=0,dr=0,tr=0,fv=0;weeks.forEach(w=>{let d=data(w.week);if(d.done)dw++;dr+=d.refs.filter(r=>r.done).length;fv+=d.refs.filter(r=>r.fav).length;tr+=d.refs.length});document.getElementById('prog').style.width=Math.round(dw/78*100)+'%';document.getElementById('stats').textContent=`${dw}/78 weeks complete • ${dr}/${tr} references checked • ⭐ ${fv} favorites`}
function exportData(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jesus-christ-study-backup.json';a.click()}
function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();renderDetail();alert('Imported')}catch{alert('Could not import')}};r.readAsText(f)}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function attr(s=''){return esc(s).replace(/"/g,'&quot;')}
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});renderList();renderDetail();stats();
